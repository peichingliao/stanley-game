<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餅乾大冒險！</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍪 餅乾大冒險！</h1>

<div id="hud">
  <div class="hud-box" id="room-display">📍 魔法森林</div>
  <div class="hud-box" id="cookie-counter">🍪 0 / 10</div>
  <button id="hint-btn" onclick="showHint()">💡 提示</button>
</div>

<div id="game-wrapper"><div id="game-container">
  <!-- Rooms are populated by JavaScript each game -->
  <div class="room active" id="room-forest"></div>
  <div class="room" id="room-castle"></div>
  <div class="room" id="room-underwater"></div>
  <div class="room" id="room-sky"></div>
  <div class="room" id="room-candy"></div>
  <div class="room" id="room-volcano"></div>

  <!-- Trap countdown panel -->
  <div id="trap-panel">
    <div id="trap-warning">☠️ 陷阱餅乾！快找到真正的餅乾！</div>
    <div id="trap-countdown">20</div>
    <div id="trap-bar-wrap"><div id="trap-bar"></div></div>
    <div id="trap-saved-msg">🎉 得救了！</div>
  </div>

  <!-- Player character (SVG) -->
  <div id="player">
    <div id="player-flip">
      <div id="player-walk">
        <svg width="68" height="84" viewBox="0 0 68 84" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="28" cy="9" rx="13" ry="6" fill="#7B3F00"/>
          <path d="M15 12 Q16 3 28 2 Q40 3 41 12" fill="#7B3F00"/>
          <circle cx="28" cy="18" r="13" fill="#FDDCB5"/>
          <circle cx="23" cy="16" r="2.2" fill="#1A0A00"/>
          <circle cx="33" cy="16" r="2.2" fill="#1A0A00"/>
          <circle cx="23.8" cy="15.2" r="0.8" fill="white"/>
          <circle cx="33.8" cy="15.2" r="0.8" fill="white"/>
          <path d="M20 12.5 Q23 11 26 12.5" stroke="#7B3F00" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M30 12.5 Q33 11 36 12.5" stroke="#7B3F00" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <circle cx="28" cy="20" r="1.1" fill="#E8A880"/>
          <path d="M23 23.5 Q28 28 33 23.5" stroke="#C0392B" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <ellipse cx="20" cy="22" rx="3.5" ry="2.5" fill="#FFB6C1" opacity="0.5"/>
          <ellipse cx="36" cy="22" rx="3.5" ry="2.5" fill="#FFB6C1" opacity="0.5"/>
          <rect x="24" y="30" width="8" height="5" rx="2" fill="#FDDCB5"/>
          <rect x="14" y="33" width="28" height="21" rx="5" fill="#3498DB"/>
          <path d="M21 33 L28 39 L35 33" fill="none" stroke="#1F6FA3" stroke-width="1.2"/>
          <rect x="14" y="38" width="28" height="3" fill="#2980B9" opacity="0.35"/>
          <g id="arm-left">
            <rect x="5" y="34" width="9" height="15" rx="4.5" fill="#FDDCB5"/>
            <circle cx="9.5" cy="50" r="4" fill="#FDDCB5"/>
          </g>
          <path d="M42 37 C52 36 57 44 55 52" stroke="#FDDCB5" stroke-width="9" fill="none" stroke-linecap="round"/>
          <circle cx="55" cy="52" r="4" fill="#FDDCB5"/>
          <path d="M45 55 Q55 65 65 55" fill="#C8960C" opacity="0.7"/>
          <ellipse cx="55" cy="55" rx="10" ry="3.5" fill="#F0C040" stroke="#C9A227" stroke-width="1"/>
          <ellipse cx="55" cy="55" rx="8.2" ry="2.5" fill="#F5D565"/>
          <text id="bowl-count" x="55" y="58.5" text-anchor="middle"
                font-size="8" font-weight="bold" fill="#7A3B00" font-family="Arial,sans-serif">0</text>
          <g id="leg-left">
            <rect x="15" y="52" width="11" height="18" rx="4" fill="#1E3A5A"/>
            <ellipse cx="20.5" cy="71" rx="8" ry="4" fill="#1A252F"/>
          </g>
          <g id="leg-right">
            <rect x="30" y="52" width="11" height="18" rx="4" fill="#1E3A5A"/>
            <ellipse cx="35.5" cy="71" rx="8" ry="4" fill="#1A252F"/>
          </g>
        </svg>
      </div>
    </div>
  </div>
</div></div>

<div id="map-legend">滑鼠移到發光物件上可找到秘密通道，點擊餅乾就能收集！</div>

<!-- Difficulty selection screen -->
<div id="difficulty-screen">
  <h2>🍪 餅乾大冒險！</h2>
  <p>選擇你的難易度，然後開始冒險！</p>
  <div class="diff-grid">
    <button class="diff-btn" data-diff="novice" onclick="startGame('novice')">
      <span class="diff-emoji">😊</span>
      <span class="diff-name">新手</span>
      <span class="diff-desc">沒有陷阱<br>輕鬆探索！</span>
    </button>
    <button class="diff-btn" data-diff="basic" onclick="startGame('basic')">
      <span class="diff-emoji">🙂</span>
      <span class="diff-name">基礎</span>
      <span class="diff-desc">2 個陷阱餅乾<br>小心一點！</span>
    </button>
    <button class="diff-btn" data-diff="medium" onclick="startGame('medium')">
      <span class="diff-emoji">😬</span>
      <span class="diff-name">中級</span>
      <span class="diff-desc">5 個陷阱餅乾<br>保持警惕！</span>
    </button>
    <button class="diff-btn" data-diff="expert" onclick="startGame('expert')">
      <span class="diff-emoji">😰</span>
      <span class="diff-name">專家</span>
      <span class="diff-desc">15 個陷阱餅乾<br>危機四伏！</span>
    </button>
    <button class="diff-btn" data-diff="boss" onclick="startGame('boss')">
      <span class="diff-emoji">😱</span>
      <span class="diff-name">魔王</span>
      <span class="diff-desc">10 陷阱 + 5 恐怖餅乾<br>碰一下就 Game Over！</span>
    </button>
  </div>
</div>

<!-- Game over screen -->
<div id="gameover-screen">
  <div class="go-icon">☠️</div>
  <h2>遊戲結束！</h2>
  <p id="gameover-msg">你被陷阱餅乾困住太久了！<br>下次要小心那些<span style="color:#ff8888">奇怪的餅乾</span>喔！</p>
  <button id="gameover-btn" onclick="restartGame()">再試一次 🔄</button>
</div>

<div id="win-screen">
  <div class="win-trophy">🏆</div>
  <h2>太棒了！全部找到了！</h2>
  <p>你找到了全部 <strong>10 個餅乾</strong>！<br>你真是個超級冒險家！🦸</p>
  <button id="restart-btn" onclick="restartGame()">再玩一次 🔄</button>
</div>

<div id="transition-overlay"></div>

<script src="game.js"></script>
</body>
</html>
